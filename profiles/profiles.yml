multi_tenant_target:
  target: dev_databricks
  outputs:
    dev_databricks:
      type: databricks
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'main') }}"
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA', 'dbt_ci') }}"
      host: "{{ env_var('DATABRICKS_HOST', 'https://adb-placeholder.azuredatabricks.net') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '/sql/1.0/warehouses/placeholder') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', 'placeholder') }}"
      threads: 4
