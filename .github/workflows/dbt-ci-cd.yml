name: dbt Multi-Tenant CI/CD - Optimized with Test Splitting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: profiles
  DBT_TARGET: dev_databricks

jobs:
  contract-gate:
    name: Contract Gate (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install & deps
        run: |
          pip install dbt-core dbt-bigquery dbt-snowflake dbt-databricks
          dbt deps --profiles-dir $DBT_PROFILES_DIR

      - name: Contract Build Gate
        run: >-
          dbt build --profiles-dir $DBT_PROFILES_DIR --target $DBT_TARGET --vars "{\"tenant_name\": \"tenant_a\"}" --selector contract_gate

  dbt-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tenant: [tenant_a, tenant_b, tenant_c]
      max-parallel: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install & deps
        run: |
          pip install dbt-core dbt-bigquery dbt-snowflake dbt-databricks
          dbt deps --profiles-dir $DBT_PROFILES_DIR

      - name: Parse
        run: dbt parse --profiles-dir $DBT_PROFILES_DIR --target $DBT_TARGET

      - name: Build
        run: >-
          dbt build --profiles-dir $DBT_PROFILES_DIR --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target $DBT_TARGET --threads 4

      - name: Split Tests (Singular)
        run: >-
          dbt test --profiles-dir $DBT_PROFILES_DIR --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target $DBT_TARGET --select "test_type:singular" --threads 8

      - name: Split Tests (Generic)
        run: >-
          dbt test --profiles-dir $DBT_PROFILES_DIR --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target $DBT_TARGET --select "test_type:generic" --threads 8