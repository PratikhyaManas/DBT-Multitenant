name: dbt Multi-Tenant CI/CD - Optimized with Test Splitting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-gate:
    name: Contract Gate (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install & deps
        run: |
          pip install dbt-core dbt-bigquery dbt-snowflake dbt-databricks
          dbt deps --profiles-dir profiles

      - name: Contract Build Gate
        run: >-
          dbt build --profiles-dir profiles --target dev_databricks --vars "{\"tenant_name\": \"tenant_a\"}" --select kpi_executive_scorecard semantic_business_metrics

  dbt-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tenant: [tenant_a, tenant_b, tenant_c]
      max-parallel: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install & deps
        run: |
          pip install dbt-core dbt-bigquery dbt-snowflake dbt-databricks
          dbt deps --profiles-dir profiles

      - name: Parse
        run: dbt parse --profiles-dir profiles --target dev_databricks

      - name: Build
        run: >-
          dbt build --profiles-dir profiles --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target dev_databricks --threads 4

      - name: Split Tests (Singular)
        run: >-
          dbt test --profiles-dir profiles --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target dev_databricks --select "test_type:singular" --threads 8

      - name: Split Tests (Generic)
        run: >-
          dbt test --profiles-dir profiles --vars "{\"tenant_name\": \"${{ matrix.tenant }}\"}" --target dev_databricks --select "test_type:generic" --threads 8